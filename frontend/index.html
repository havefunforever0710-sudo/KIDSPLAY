<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KidsPlay - 兒童活動尋寶圖</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🎈</span>
                <h1>KidsPlay</h1>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="尋找好玩的活動...">
                <button aria-label="Search">🔍</button>
            </div>
            
            <!-- Filters -->
            <div class="filters-container">
                <div class="filter-row">
                    <div class="filter-dropdown">
                        <select id="regionSelect">
                            <option value="All">全台灣 (選分區)</option>
                            <option value="北部">北部</option>
                            <option value="中部">中部</option>
                            <option value="南部">南部</option>
                            <option value="東部及離島">東部及離島</option>
                        </select>
                    </div>
                    <!-- City multi-select (Hidden initially) -->
                    <div class="filter-dropdown multi-select-container" id="citySelectContainer" style="display: none;">
                        <div class="multi-select-btn" id="citySelectBtn">選擇縣市 ▼</div>
                        <div class="multi-select-menu" id="citySelectMenu">
                            <!-- Checkboxes injected by JS -->
                        </div>
                    </div>
                </div>
                <div class="filter-row">
                    <div class="filter-dropdown">
                        <select id="ageSelect">
                            <option value="All">年齡不限</option>
                            <option value="0-3歲">0-3歲</option>
                            <option value="4-6歲">4-6歲</option>
                            <option value="7-12歲">7-12歲</option>
                        </select>
                    </div>
                    <div class="filter-dropdown">
                        <select id="priceSelect">
                            <option value="All">免費/付費皆可</option>
                            <option value="免費">僅顯示免費</option>
                            <option value="付費">僅顯示付費</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Categories -->
            <section class="categories-section">
                <div class="categories-scroll" id="categoryContainer">
                    <!-- Categories will be injected here -->
                </div>
            </section>

            <!-- Events Section -->
            <section class="events-section">
                <div class="events-header">
                    <h2 id="currentCategoryTitle">為您推薦</h2>
                    
                    <!-- View Toggle -->
                    <div class="view-toggle">
                        <button id="btnListView" class="toggle-btn active" title="清單模式">📄 清單</button>
                        <button id="btnCalendarView" class="toggle-btn" title="月曆模式">📅 月曆</button>
                    </div>
                </div>

                <!-- Calendar View (Hidden by default) -->
                <div id="calendarView" class="calendar-container" style="display: none;">
                    <div class="calendar-header">
                        <button id="prevMonth" class="cal-nav-btn">◀</button>
                        <h3 id="currentMonthYear">2026年 4月</h3>
                        <button id="nextMonth" class="cal-nav-btn">▶</button>
                    </div>
                    <div class="calendar-days-header">
                        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                    </div>
                    <div class="calendar-grid" id="calendarGrid">
                        <!-- Calendar days injected here -->
                    </div>
                    
                    <div class="selected-date-info">
                        <h4 id="selectedDateTitle">請選擇日期</h4>
                    </div>
                </div>

                <!-- List View (Events Grid) -->
                <div class="events-grid" id="eventContainer">
                    <!-- Event cards will be injected here -->
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span>首頁</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">❤️</span>
                <span>收藏</span>
            </div>
            <div class="nav-item" onclick="document.getElementById('btnCalendarView').click()">
                <span class="nav-icon">📅</span>
                <span>行事曆</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">👤</span>
                <span>我的</span>
            </div>
        </nav>
    </div>

    <script src="data.js"></script>
    <script src="events.js"></script>
    <script src="app.js"></script>
</body>
</html>
