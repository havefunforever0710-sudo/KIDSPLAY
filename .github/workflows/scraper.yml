name: Daily KidsPlay Scraper

on:
  schedule:
    # 每天台灣時間凌晨 3:00 (UTC 19:00) 自動執行
    - cron: '0 19 * * *'
  workflow_dispatch:
    # 允許在 GitHub 網頁上手動點擊執行

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🤖 Run scraper script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scraper.py

      - name: 📤 Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/events.js frontend/events.json state.json
          # 如果沒有變更就不會報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update events data & state" && git push)
